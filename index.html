<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zendo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Zendo 🙊</h1>
      <p class="subtitle">Your one and only needed planner 💕</p>
      <p id="date"></p>
      <button id="toggle">dark/light mode</button>
    </div>

    <div class="add-section">
      <input type="text" id="taskInput" placeholder="What do you want to focus on?">
      <input type="time" id="timeInput">
      <button onclick="addTask()">add</button>
      <p class="motivation">Focus on one thing at a time 🌿</p>
    </div>

    <div class="tasks-section">
      <h2>Tasks</h2>
      <ul id="tasklist"></ul>
      <p id="empty"></p>
    </div>

    <div class="progress-section">
      <p id="progress"></p>
      <div id="progressbar">
        <div id="progressfill"></div>
      </div>
      <p class="tip">Tip: Take a 5 min break between tasks ✨</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
